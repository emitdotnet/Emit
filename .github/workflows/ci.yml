name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run unit tests
      run: dotnet test tests/Emit.UnitTests/Emit.UnitTests.csproj --no-build --verbosity normal --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults

    - name: Upload unit test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: unit-test-results
        path: TestResults/unit-tests.trx

    - name: Check code formatting
      run: dotnet format --verify-no-changes

  integration-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run integration tests
      run: dotnet test tests/Emit.IntegrationTests/Emit.IntegrationTests.csproj --no-build --verbosity normal --logger "trx;LogFileName=integration-tests.trx" --results-directory TestResults

    - name: Upload integration test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: integration-test-results
        path: TestResults/integration-tests.trx
